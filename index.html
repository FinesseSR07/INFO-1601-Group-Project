<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
</head>
<style>
  *{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --navy: #1e3a4a;
    --teal: #2d7d9a;
    --orange: #f4891f;
    --bg: #e8f0f7;
    --card: #ffffff;
    --text: #1a2b35;
    --muted: #5a7a8a;
    --border: #cddbe5;
    --surface: #f0f7fb;
    --radius: 14px;
    }
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: Arial, Helvetica, sans-serif; 
    min-height: 100vh; 
  }

  nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--navy); padding: 14px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
  .nav-brand h1 { 
      color: #fff; 
      font-size: 20px; 
    }
  .nav-brand p  { 
    color: #a8c5d4; 
    font-size: 12px; 
    margin-top: 2px; 
  }
  #logoutBtn { 
    display: none; 
    background: transparent; 
    border: 1.5px solid #a8c5d4; 
    color: #a8c5d4; 
    padding: 6px 14px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 13px; 
  }
  #logoutBtn:hover { 
    background: rgba(255,255,255,0.1); 
  }
  #loginOverlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(20,40,55,0.85);
      display: flex; align-items: center; justify-content: center;
    }
  .login-card {
      background: var(--card); border-radius: 18px;
      padding: 36px 32px; width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
  .login-card h2 { 
    font-size: 22px; 
    color: var(--navy); 
    margin-bottom: 6px; 
  }
  .login-card p  { 
    font-size: 13px; 
    color: var(--muted); 
    margin-bottom: 24px; 
  }
  .login-card label { 
    display: block; 
    font-size: 12px; 
    font-weight: 600; 
    color: var(--muted); 
    text-transform: uppercase; 
    margin-bottom: 4px; 
  }
  .login-card input {
      width: 100%; 
      padding: 10px 12px; 
      border: 1.5px solid var(--border);
      border-radius: 8px; 
      font-size: 14px; 
      color: var(--text);
      margin-bottom: 14px; 
      outline: none;
    }
  .login-card input:focus { 
    border-color: var(--teal); 
  }
  #loginBtn { 
    width: 100%; 
    padding: 11px; 
    background: var(--orange); 
    border: none; 
    border-radius: 8px; 
    color: #fff; 
    font-size: 15px; 
    font-weight: 600; 
    cursor: pointer; 
  }
  #loginBtn:hover { 
    background: #e07a10; 
  }
  #loginError { 
    color: #c0392b; 
    font-size: 13px; 
    margin-top: 10px; 
    display: none; 
  }

  #publicBanner { 
    background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%); 
    color: #fff; 
    padding: 40px 24px; 
    text-align: center; 
  }
  #publicBanner h2 { 
    font-size: 26px; 
    margin-bottom: 8px; 
  }
  #publicBanner p  { 
    font-size: 14px; 
    color: #b8d8e8; 
    margin-bottom: 20px; 
  }
  #loginPromptBtn { 
    background: var(--orange); 
    border: none; 
    color: #fff; 
    padding: 10px 24px; 
    border-radius: 8px; 
    font-size: 14px; 
    cursor: pointer; 
  }
  #loginPromptBtn:hover { 
    background: #e07a10; 
  }

  .container { 
    max-width: 980px; 
    margin: 0 auto; 
    padding: 24px; 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 16px; 
  }
  .card { 
    background: var(--card); 
    border-radius: var(--radius); 
    padding: 18px 20px; 
    border: 1px solid var(--border); 
  }
  .card h2 { 
    font-size: 11px; 
    color: var(--muted); 
    text-transform: uppercase; 
    letter-spacing: 0.8px; 
    margin-bottom: 14px; 
  }
  .span2 { 
    grid-column: span 2; 
  }

  .search-row { 
    display: flex; 
    gap: 8px; 
  }
  .search-row input { 
    flex: 1; 
    padding: 10px 14px; 
    border: 1.5px solid var(--border); 
    border-radius: 8px; font-size: 14px; 
    outline: none; color: var(--text); 
    background: #fff; 
  }
  .search-row input:focus { 
    border-color: var(--teal); 
  }
  .btn-primary { 
    background: var(--orange); 
    border: none; 
    color: #fff; 
    padding: 10px 18px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 14px; 
  }
  .btn-primary:hover { 
    background: #e07a10; 
  }

  #savedCitiesList { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
  }
  .city-chip { 
    background: #e8f4f8; 
    border: 1.5px solid var(--border); 
    border-radius: 20px; 
    padding: 6px 14px; 
    font-size: 13px; 
    cursor: pointer; 
    color: var(--navy); 
    display: flex; 
    align-items: center; 
    gap: 6px; 
  }
  .city-chip:hover { 
    background: #cde5f0; 
  }
  .city-chip .del { 
    color: var(--muted); 
    font-size: 15px; 
    line-height: 1; 
  }
  .city-chip .del:hover { 
    color: #c0392b; 
  }

  .weather-main { 
    display: flex; 
    align-items: center; 
    gap: 16px; 
    margin-bottom: 14px; 
  }
  .weather-icon { 
    font-size: 52px; 
    line-height: 1; 
  }
  .weather-info h3 { 
    font-size: 20px; 
    font-weight: 600; 
  }
  .weather-info .temp { 
    font-size: 38px; 
    font-weight: 700; 
    color: var(--teal); 
    line-height: 1.1; 
  }
  .weather-info .cond { 
    font-size: 14px; 
    color: var(--muted); 
  }
  .weather-stats { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
  }
  .stat-box { 
    background: var(--surface); 
    border-radius: 10px; 
    padding: 10px 12px; 
  }
  .stat-box .label { 
    font-size: 11px; 
    color: var(--muted); 
    text-transform: uppercase; 
  }
  .stat-box .val { 
    font-size: 18px; 
    font-weight: 600; 
    color: var(--navy); 
  }
  #saveCityBtn { 
    margin-top: 12px; 
    background: var(--teal); 
    border: none; 
    color: #fff; 
    padding: 8px 18px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 13px; 
  }
  #saveCityBtn:hover { 
    background: #246880; 
  }
  #saveCityBtn:disabled { 
    background: #a0c4d4; 
    cursor: default; 
  }

  #forecastContainer { 
    display: flex; 
    gap: 10px; 
    overflow-x: auto; 
    padding-bottom: 4px; 
  }
  .forecast-card { 
    min-width: 115px; 
    background: var(--surface); 
    border-radius: 10px; 
    padding: 12px; 
    text-align: center; 
    flex-shrink: 0; 
  }
  .forecast-card .day { 
    font-size: 11px; 
    color: var(--muted); 
    margin-bottom: 4px; 
  }
  .forecast-card .fc-icon { 
    font-size: 26px; 
  }
  .forecast-card .fc-temp { 
    font-size: 15px; 
    font-weight: 600; 
    color: var(--navy); 
  }
  .forecast-card .fc-feel { 
    font-size: 11px; 
    color: var(--teal); 
    margin-top: 2px; 
  }
  .forecast-card .fc-cond { 
    font-size: 11px; 
    color: var(--muted); 
    margin-top: 2px; 
    }
</style>
<script>

</script>
<body>

</body>
</html>
